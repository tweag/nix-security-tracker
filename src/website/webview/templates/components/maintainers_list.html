{% load viewutils %}

{% if maintainers %}
  <details class="maintainers" id="">
    <summary>
      Notify package maintainers: {{ maintainers | length }}
    </summary>

    <div class="maintainers-list">
      {% for maintainer in maintainers %}
        <div class="maintainer-container">
          {% if selectable %}
          {% selectable_maintainer maintainer deleted_maintainers[maintainer.github_id] %}
          {% else %}
          {% maintainer maintainer %}
        </div>
      {% endfor %}
    </div>
  </details>
{% endif %}
